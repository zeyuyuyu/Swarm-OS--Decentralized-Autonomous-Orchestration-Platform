<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swarm OS Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00ff9d;
            --secondary: #0a192f;
            --accent: #64ffda;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', sans-serif;
            background: var(--secondary);
            color: var(--primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .header h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            text-shadow: 0 0 10px var(--primary);
            animation: glow 2s ease-in-out infinite alternate;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 15px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .metric {
            font-size: 2rem;
            margin: 1rem 0;
            color: var(--accent);
        }

        .nodes-container {
            position: relative;
            height: 300px;
            margin-top: 2rem;
        }

        .node {
            position: absolute;
            width: 20px;
            height: 20px;
            background: var(--primary);
            border-radius: 50%;
            transition: all 0.3s ease;
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 10px var(--primary);
            }
            to {
                text-shadow: 0 0 20px var(--primary), 0 0 30px var(--accent);
            }
        }

        .stats {
            margin-top: 2rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
        }

        .progress-bar {
            width: 100%;
            height: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            overflow: hidden;
            margin: 1rem 0;
        }

        .progress {
            height: 100%;
            background: var(--primary);
            width: 75%;
            transition: width 0.3s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>Swarm OS Dashboard</h1>
            <p>Decentralized Autonomous Orchestration Platform</p>
        </header>

        <div class="grid">
            <div class="card">
                <h2>Active Nodes</h2>
                <div class="metric" id="nodeCount">42</div>
                <div class="nodes-container" id="nodesVisual"></div>
            </div>

            <div class="card">
                <h2>System Health</h2>
                <div class="metric">98%</div>
                <div class="progress-bar">
                    <div class="progress"></div>
                </div>
            </div>

            <div class="card">
                <h2>Tasks Completed</h2>
                <div class="metric" id="taskCount">1,337</div>
                <div class="stats">
                    <p>Success Rate: 99.9%</p>
                    <p>Avg. Response Time: 42ms</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Animated nodes visualization
        function createNodes() {
            const container = document.getElementById('nodesVisual');
            const nodeCount = 20;

            for (let i = 0; i < nodeCount; i++) {
                const node = document.createElement('div');
                node.className = 'node';
                node.style.left = `${Math.random() * 100}%`;
                node.style.top = `${Math.random() * 100}%`;
                container.appendChild(node);

                // Animate nodes
                setInterval(() => {
                    node.style.left = `${Math.random() * 100}%`;
                    node.style.top = `${Math.random() * 100}%`;
                }, 3000 + Math.random() * 2000);
            }
        }

        // Increment counters
        function animateNumbers() {
            const nodeCount = document.getElementById('nodeCount');
            const taskCount = document.getElementById('taskCount');
            let nodes = 0;
            let tasks = 0;

            const nodeInterval = setInterval(() => {
                nodes++;
                nodeCount.textContent = nodes;
                if (nodes >= 42) clearInterval(nodeInterval);
            }, 50);

            const taskInterval = setInterval(() => {
                tasks += 7;
                taskCount.textContent = tasks.toLocaleString();
                if (tasks >= 1337) clearInterval(taskInterval);
            }, 20);
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            createNodes();
            animateNumbers();
        });
    </script>
</body>
</html>
