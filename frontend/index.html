<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Swarmarcy - Decentralized Web Crawling Network</title>
    <style>
        :root {
            --primary: #6C63FF;
            --secondary: #2D3748;
            --accent: #48BB78;
            --bg: #1A202C;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: white;
            line-height: 1.6;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }

        .header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .logo {
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 1rem;
            animation: pulse 2s infinite;
        }

        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
        }

        .card {
            background: var(--secondary);
            border-radius: 10px;
            padding: 1.5rem;
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .stats {
            font-size: 2rem;
            color: var(--primary);
            margin: 1rem 0;
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #4A5568;
            border-radius: 5px;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 1s;
        }

        .network-viz {
            width: 100%;
            height: 400px;
            background: var(--secondary);
            border-radius: 10px;
            margin: 2rem 0;
            position: relative;
            overflow: hidden;
        }

        .node {
            width: 10px;
            height: 10px;
            background: var(--primary);
            border-radius: 50%;
            position: absolute;
            animation: float 3s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="logo">🕸️ Swarmarcy</h1>
            <p>Decentralized Web Crawling Network</p>
        </header>

        <div class="dashboard">
            <div class="card">
                <h2>Active Crawlers</h2>
                <div class="stats" id="crawler-count">0</div>
                <div class="progress-bar">
                    <div class="progress" id="crawler-progress"></div>
                </div>
            </div>

            <div class="card">
                <h2>Pages Crawled</h2>
                <div class="stats" id="pages-count">0</div>
                <div class="progress-bar">
                    <div class="progress" id="pages-progress"></div>
                </div>
            </div>

            <div class="card">
                <h2>Network Health</h2>
                <div class="stats" id="health-status">98%</div>
                <div class="progress-bar">
                    <div class="progress" id="health-progress"></div>
                </div>
            </div>
        </div>

        <div class="network-viz" id="network"></div>
    </div>

    <script>
        // Simulate crawler network activity
        function initNetwork() {
            const network = document.getElementById('network');
            for(let i = 0; i < 20; i++) {
                const node = document.createElement('div');
                node.className = 'node';
                node.style.left = Math.random() * 100 + '%';
                node.style.top = Math.random() * 100 + '%';
                node.style.animationDelay = Math.random() * 2 + 's';
                network.appendChild(node);
            }
        }

        // Animate stats
        function animateStats() {
            let crawlers = 0;
            let pages = 0;
            const crawlerTarget = 156;
            const pagesTarget = 12489;

            const crawlerInterval = setInterval(() => {
                crawlers += 1;
                document.getElementById('crawler-count').textContent = crawlers;
                document.getElementById('crawler-progress').style.width = (crawlers/crawlerTarget * 100) + '%';
                if(crawlers >= crawlerTarget) clearInterval(crawlerInterval);
            }, 20);

            const pagesInterval = setInterval(() => {
                pages += 100;
                document.getElementById('pages-count').textContent = pages.toLocaleString();
                document.getElementById('pages-progress').style.width = (pages/pagesTarget * 100) + '%';
                if(pages >= pagesTarget) clearInterval(pagesInterval);
            }, 10);

            document.getElementById('health-progress').style.width = '98%';
        }

        // Initialize
        window.onload = () => {
            initNetwork();
            animateStats();
        };
    </script>
</body>
</html>
